<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像とプログラムリストの例</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 画像をレスポンシブに */
    .hero-image {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
      border-radius: 8px;
    }
    /* プログラムリストの見た目 */
    .program-list {
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    }
    .program-list h2 {
      font-size: 1.25rem;
      margin-bottom: 8px;
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }
    .program-item {
      margin: 8px 0;
    }
    .program-time {
      font-weight: 600;
      color: #333;
      margin-right: 8px;
    }
    .program-title {
      color: #222;
    }
    .program-desc {
      color: #666;
      margin-left: 28px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <figure>
    <img
      src="images/20251214_toukitaikai.jpg"
      alt="イベント会場の様子"
      class="hero-image"
      loading="lazy"
      width="1200"
      height="800">
    <figcaption>イベント会場イメージ</figcaption>
  </figure>
